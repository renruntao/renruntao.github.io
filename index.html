<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Runtao Ren — Academic Homepage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          animation: { 'fade-up': 'fadeUp .8s ease-out forwards' },
          keyframes: {
            fadeUp: {
              '0%':   { opacity: '0', transform: 'translateY(30px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    .reveal{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}
    .reveal.visible{opacity:1;transform:translateY(0)}
  </style>
</head>

<body class="min-h-screen bg-slate-50 font-sans text-slate-800 antialiased">

<!-- ─── NAV ─── -->
<nav id="navbar" class="fixed top-0 w-full z-50 transition-all duration-300 bg-transparent py-5">
  <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
    <span id="nav-brand" class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 cursor-pointer"></span>
    <div class="hidden md:flex space-x-1 border border-slate-200 rounded-full p-1 bg-white/50 backdrop-blur-sm" id="nav-pills"></div>
    <button class="md:hidden p-2 rounded-lg hover:bg-slate-100" id="mobile-toggle">
      <i data-lucide="menu" class="w-5 h-5"></i>
    </button>
  </div>
  <div id="mobile-menu" class="hidden md:hidden px-6 pt-3 pb-1">
    <div class="bg-white rounded-2xl p-2 shadow-lg border border-slate-200 space-y-1" id="mobile-nav"></div>
  </div>
</nav>

<!-- ─── CONTENT ─── -->
<div id="app"></div>

<!-- ─── FOOTER ─── -->
<footer id="footer" class="bg-slate-900 text-slate-400 py-12 px-6"></footer>

<script src="data.js"></script>
<script>
(function(){
  /* ── data source: admin preview (localStorage) → data.js default ── */
  let D;
  try { const s = localStorage.getItem('SITE_DATA'); D = s ? JSON.parse(s) : SITE; }
  catch(e){ D = SITE; }
  const P = D.profile;

  /* ── helpers ── */
  const orcidSVG = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.372.002 0 5.375 0 12c0 6.628 5.372 12 12 12s12-5.372 12-12c0-6.625-5.372-12-12-12zM7.369 4.378a.8.8 0 11-1.6 0 .8.8 0 011.6 0zM7.74 19.16H5.4v-11.8h2.34v11.8zm11.166-4.595c0 2.518-1.577 4.595-4.57 4.595h-4.04V7.36h4.153c2.754 0 4.457 1.838 4.457 4.298v2.907zm-2.314-2.886c0-1.29-.817-2.185-2.22-2.185h-1.808v7.3h1.84c1.378 0 2.188-.934 2.188-2.3v-2.815z"/></svg>';

  function esc(s){ return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function goTo(id){
    const el = document.getElementById(id);
    if(el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' });
  }
  window._goTo = goTo;

  /* ── nav ── */
  document.getElementById('nav-brand').textContent = P.name;
  document.getElementById('nav-brand').onclick = ()=> goTo('homepage');

  const navItems = [
    { id:'homepage', icon:'user',      label:'Home' },
    { id:'news',     icon:'rss',       label:'News' },
    { id:'pubs',     icon:'book-open', label:'Publications' },
    { id:'grants',   icon:'award',     label:'Grants' },
    { id:'contact',  icon:'mail',      label:'Contact' },
  ];

  document.getElementById('nav-pills').innerHTML = navItems.map(n=>`
    <button data-nav="${n.id}" class="nav-pill flex items-center space-x-2 px-4 py-2 rounded-full text-sm font-medium transition-all duration-300 text-slate-600 hover:text-blue-600 hover:bg-blue-50">
      <i data-lucide="${n.icon}" class="w-4 h-4"></i><span>${n.label}</span>
    </button>`).join('');

  document.getElementById('mobile-nav').innerHTML = navItems.map(n=>`
    <button data-nav="${n.id}" class="flex items-center space-x-2 w-full px-4 py-3 rounded-xl text-sm font-medium text-slate-600 hover:text-blue-600 hover:bg-blue-50 transition-all">
      <i data-lucide="${n.icon}" class="w-4 h-4"></i><span>${n.label}</span>
    </button>`).join('');

  document.addEventListener('click', e=>{
    const btn = e.target.closest('[data-nav]');
    if(btn){ goTo(btn.dataset.nav); document.getElementById('mobile-menu').classList.add('hidden'); }
  });
  document.getElementById('mobile-toggle').onclick = ()=>
    document.getElementById('mobile-menu').classList.toggle('hidden');

  /* ── HERO ── */
  const hero = `
  <section id="homepage" class="pt-32 pb-20 px-6 min-h-[90vh] flex items-center relative overflow-hidden">
    <div class="absolute top-20 right-0 w-[500px] h-[500px] bg-blue-400/20 rounded-full blur-3xl -z-10 mix-blend-multiply"></div>
    <div class="absolute bottom-0 left-10 w-[400px] h-[400px] bg-indigo-400/20 rounded-full blur-3xl -z-10 mix-blend-multiply"></div>
    <div class="max-w-6xl mx-auto grid md:grid-cols-5 gap-12 items-center w-full">

      <div class="md:col-span-3 space-y-8 animate-fade-up">
        <div class="inline-block px-4 py-1.5 rounded-full bg-blue-100 text-blue-700 font-medium text-sm border border-blue-200">
          ${P.welcomeText}
        </div>
        <h1 class="text-5xl md:text-6xl font-extrabold leading-tight text-slate-900">
          ${P.heroTitle}<br>
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">${P.heroHighlight}</span>
        </h1>
        <p class="text-lg text-slate-600 leading-relaxed max-w-2xl">${P.bio}</p>

        <div class="flex flex-wrap gap-4 pt-4">
          ${P.scholarUrl ? `<a href="${P.scholarUrl}" target="_blank" rel="noreferrer" class="flex items-center space-x-2 bg-slate-900 text-white px-6 py-3 rounded-xl hover:bg-slate-800 transition-all shadow-lg hover:shadow-xl hover:-translate-y-1"><i data-lucide="graduation-cap" class="w-5 h-5"></i><span>Google Scholar</span></a>` : ''}
          ${P.orcidUrl ? `<a href="${P.orcidUrl}" target="_blank" rel="noreferrer" class="flex items-center space-x-2 bg-[#A6CE39] text-white px-6 py-3 rounded-xl hover:bg-[#95b933] transition-all shadow-lg hover:shadow-xl hover:-translate-y-1">${orcidSVG}<span class="ml-2">ORCID</span></a>` : ''}
          <button data-nav="pubs" class="flex items-center space-x-2 bg-white text-slate-700 border border-slate-200 px-6 py-3 rounded-xl hover:border-blue-300 hover:text-blue-600 transition-all shadow-sm hover:shadow-md hover:-translate-y-1">
            <i data-lucide="book-open" class="w-5 h-5"></i><span>Publications</span>
          </button>
        </div>
      </div>

      <div class="md:col-span-2 flex justify-center relative">
        <div class="relative w-72 h-72 md:w-80 md:h-80">
          <div class="absolute inset-0 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-3xl rotate-6 opacity-20 blur-lg animate-pulse"></div>
          <div class="absolute inset-0 bg-gradient-to-br from-white to-slate-100 rounded-3xl shadow-2xl border border-white/50 overflow-hidden group">
            <img src="${P.photo}" alt="${P.name}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
                 onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(P.name)}&size=400&background=4f46e5&color=fff&bold=true&font-size=0.36'">
          </div>
          <div class="absolute -bottom-6 -left-6 bg-white p-4 rounded-xl shadow-xl border border-slate-100 flex items-center space-x-3">
            <div class="bg-blue-100 p-2 rounded-lg text-blue-600"><i data-lucide="message-square-quote" class="w-5 h-5"></i></div>
            <div>
              <div class="text-sm font-bold text-slate-800">Citations</div>
              <div class="text-xl font-black text-blue-600">${P.citationCount}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>`;

  /* ── NEWS ── */
  const news = `
  <section id="news" class="py-20 px-6 bg-white border-y border-slate-100">
    <div class="max-w-4xl mx-auto">
      <div class="flex items-center space-x-3 mb-12">
        <i data-lucide="rss" class="w-7 h-7 text-blue-600"></i>
        <h2 class="text-3xl font-bold text-slate-900">News</h2>
      </div>
      <div class="space-y-8 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-blue-200 before:to-transparent">
        ${D.news.map((n,i)=>{
          const flip = i%2!==0;
          return `
          <div class="reveal relative flex items-center justify-between md:justify-normal ${flip?'md:flex-row-reverse':''} group cursor-default" style="transition-delay:${i*.1}s">
            <div class="flex items-center justify-center w-10 h-10 rounded-full border-4 border-white bg-blue-100 text-blue-600 shadow-sm shrink-0 md:order-1 ${flip?'md:translate-x-1/2':'md:-translate-x-1/2'} z-10 transition-all duration-500 group-hover:scale-125 group-hover:bg-blue-600 group-hover:text-white">
              <i data-lucide="chevron-right" class="w-4 h-4"></i>
            </div>
            <div class="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] bg-white border border-slate-100 p-5 rounded-2xl shadow-sm hover:shadow-xl transition-all duration-500 group-hover:-translate-y-2">
              ${n.image ? `<div class="w-full h-48 mb-5 overflow-hidden rounded-xl relative"><div class="absolute inset-0 bg-blue-900/10 group-hover:bg-transparent transition-colors duration-500 z-10"></div><img src="${n.image}" alt="" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy"></div>` : ''}
              <div class="flex items-center space-x-3 mb-3">
                <span class="text-sm font-bold text-slate-500">${n.date}</span>
                <span class="text-xs font-semibold px-2 py-1 rounded-md bg-indigo-100 text-indigo-700">${n.tag}</span>
              </div>
              <p class="text-slate-700 leading-relaxed">${n.content}</p>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </section>`;

  /* ── PUBLICATIONS ── */
  const pubs = `
  <section id="pubs" class="py-20 px-6 bg-slate-50">
    <div class="max-w-6xl mx-auto">
      <div class="flex items-center space-x-3 mb-12">
        <i data-lucide="book-open" class="w-7 h-7 text-blue-600"></i>
        <h2 class="text-3xl font-bold text-slate-900">Selected Publications</h2>
      </div>
      <div class="grid lg:grid-cols-2 gap-8">
        ${D.publications.map((p,i)=>`
        <div class="reveal group bg-white rounded-2xl border border-slate-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 hover:border-blue-200 transition-all duration-500 flex flex-col overflow-hidden" style="transition-delay:${i*.08}s">
          ${p.image ? `<div class="w-full h-48 overflow-hidden relative bg-slate-100 border-b border-slate-100"><div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent z-10 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div><img src="${p.image}" alt="" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy"></div>` : ''}
          <div class="p-6 flex flex-col justify-between flex-grow">
            <div>
              <h3 class="text-lg font-bold text-slate-800 leading-tight group-hover:text-blue-600 transition-colors duration-300 mb-3">${p.title}</h3>
              <p class="text-slate-600 text-sm mb-2">${p.authors}</p>
              <p class="text-slate-500 text-sm italic mb-4">${p.venue}</p>
              <div class="flex flex-wrap gap-2 mb-6">${(p.tags||[]).map(t=>`<span class="px-2.5 py-1 bg-slate-50 border border-slate-200 text-slate-600 rounded-md text-xs font-medium">${t}</span>`).join('')}</div>
            </div>
            <div class="flex justify-between items-center pt-4 border-t border-slate-200">
              <div class="flex items-center space-x-4">
                <span class="flex items-center text-sm font-semibold text-slate-700 bg-slate-50 border border-slate-200 px-3 py-1 rounded-full">\u{1F4C5} ${p.year}</span>
                ${p.citations>0 ? `<span class="flex items-center text-sm font-semibold text-indigo-700 bg-indigo-50 px-3 py-1 rounded-full"><i data-lucide="message-square-quote" class="w-3.5 h-3.5 mr-1"></i>${p.citations} Citations</span>` : ''}
              </div>
              ${p.link ? `<a href="${p.link}" target="_blank" rel="noreferrer" class="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-colors"><i data-lucide="external-link" class="w-4 h-4"></i></a>` : ''}
            </div>
          </div>
        </div>`).join('')}
      </div>
      ${P.scholarUrl ? `<div class="mt-10 text-center"><a href="${P.scholarUrl}" target="_blank" rel="noreferrer" class="inline-flex items-center space-x-2 px-6 py-3 bg-blue-50 text-blue-600 rounded-xl font-semibold hover:bg-blue-600 hover:text-white transition-all shadow-sm"><span>View full list on Google Scholar</span><i data-lucide="chevron-right" class="w-4 h-4"></i></a></div>` : ''}
    </div>
  </section>`;

  /* ── GRANTS ── */
  const grants = `
  <section id="grants" class="py-20 px-6 bg-white border-t border-slate-100">
    <div class="max-w-4xl mx-auto">
      <div class="flex items-center space-x-3 mb-12">
        <i data-lucide="award" class="w-7 h-7 text-blue-600"></i>
        <h2 class="text-3xl font-bold text-slate-900">Grants &amp; Projects</h2>
      </div>
      <div class="space-y-6">
        ${D.grants.map((g,i)=>{
          const bar = g.status==='Completed' ? 'bg-slate-400' : (i===0 ? 'bg-blue-500' : 'bg-indigo-500');
          return `
          <div class="reveal group relative bg-white border border-slate-200 rounded-2xl hover:border-blue-300 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 overflow-hidden ${g.image ? 'flex flex-col md:flex-row' : ''}" style="transition-delay:${i*.1}s">
            ${g.image ? `<div class="md:w-48 shrink-0 overflow-hidden bg-slate-100"><img src="${g.image}" alt="" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110 md:min-h-full" loading="lazy"></div>` : `<div class="absolute top-0 left-0 w-1.5 h-full ${bar} opacity-80 group-hover:w-2 transition-all duration-300"></div>`}
            <div class="${g.image ? 'p-6 flex-1' : 'p-6 pl-8'}">
              <div class="flex justify-between items-start mb-2">
                <h3 class="text-xl font-bold text-slate-800 pr-8">${g.title}</h3>
                <span class="px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap ${g.status==='Ongoing'?'bg-green-100 text-green-700':'bg-slate-100 text-slate-600'}">${g.status}</span>
              </div>
              <div class="flex flex-col sm:flex-row sm:items-center flex-wrap text-sm text-slate-600 gap-y-2 gap-x-6 mt-4">
                <div class="flex items-center space-x-2"><i data-lucide="user" class="w-4 h-4 text-slate-400"></i><span class="font-medium">${g.role}</span></div>
                <div class="flex items-center space-x-2"><i data-lucide="award" class="w-4 h-4 text-slate-400"></i><span>${g.agency}</span></div>
                <div class="flex items-center space-x-2"><i data-lucide="file-text" class="w-4 h-4 text-slate-400"></i><span>${g.period}</span></div>
                ${g.amount ? `<div class="flex items-center space-x-2"><i data-lucide="banknote" class="w-4 h-4 text-slate-400"></i><span class="font-semibold text-emerald-700">${g.amount}</span></div>` : ''}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </section>`;

  /* ── CONTACT & VISITORS (merged) ── */
  const C = D.contact || {};
  const VM = D.visitorMap || {};

  function contactItem(icon, color, label, value, href){
    const tag = href ? 'a' : 'div';
    const hrefAttr = href ? ` href="${href}"` : '';
    return `<${tag}${hrefAttr} class="flex items-start space-x-4 group">
      <div class="bg-${color}-100 text-${color}-600 p-2.5 rounded-xl shrink-0 group-hover:bg-${color}-600 group-hover:text-white transition-colors duration-300"><i data-lucide="${icon}" class="w-5 h-5"></i></div>
      <div><div class="text-xs font-bold text-slate-400 uppercase tracking-wide mb-0.5">${label}</div><div class="text-slate-800 font-medium ${href?'hover:text-blue-600 transition-colors':''}">${value}</div></div>
    </${tag}>`;
  }

  const contactItems = [
    C.email    ? contactItem('mail','blue','Email', C.email, 'mailto:'+C.email) : '',
    C.location ? contactItem('map-pin','indigo','Location', C.location) : '',
    C.office   ? contactItem('building-2','purple','Office', C.office) : '',
    C.phone    ? contactItem('phone','green','Phone', C.phone) : '',
  ].filter(Boolean).join('');

  const contact = `
  <section id="contact" class="py-20 px-6 bg-slate-50 border-t border-slate-100">
    <div class="max-w-6xl mx-auto">
      <div class="flex items-center space-x-3 mb-12">
        <i data-lucide="message-square" class="w-7 h-7 text-blue-600"></i>
        <h2 class="text-3xl font-bold text-slate-900">Contact &amp; Visitors</h2>
      </div>
      <div class="grid md:grid-cols-2 gap-8">

        <div class="reveal bg-white rounded-2xl border border-slate-200 p-8 shadow-sm">
          <h3 class="text-xl font-bold text-slate-900 mb-8">Get in Touch</h3>
          ${C.note ? `<p class="text-slate-500 text-sm mb-6">${C.note}</p>` : ''}
          <div class="space-y-6">${contactItems || '<p class="text-slate-400 text-sm">No contact info yet. Add some in admin.</p>'}</div>
        </div>

        <div class="reveal bg-white rounded-2xl border border-slate-200 p-8 shadow-sm" style="transition-delay:.1s">
          <div class="flex items-center justify-between mb-6">
            <h3 class="text-xl font-bold text-slate-900">Global Visitors</h3>
            <span class="flex items-center space-x-1.5 text-xs font-semibold text-green-600"><span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span><span>Live Tracker</span></span>
          </div>
          <div id="visitor-map-widget" class="rounded-xl overflow-hidden bg-slate-900 min-h-[220px] flex items-center justify-center">
            ${(VM.enabled && VM.embedHtml) ? '' : '<p class="text-slate-500 text-sm text-center px-4">Visitor map will appear here.<br>Get a free widget at <a href="https://clustrmaps.com" target="_blank" class="text-blue-400 underline">ClustrMaps</a> or <a href="https://www.revolvermaps.com" target="_blank" class="text-blue-400 underline">RevolverMaps</a></p>'}
          </div>
        </div>

      </div>
    </div>
  </section>`;

  /* ── FOOTER ── */
  document.getElementById('footer').innerHTML = `
    <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-8 items-center">
      <div>
        <h2 class="text-2xl font-bold text-white mb-2">${P.name}</h2>
        <p class="mb-4">${P.footerTagline}</p>
        <div class="flex space-x-4">
          ${P.email ? `<a href="mailto:${P.email}" class="hover:text-white transition-colors" title="Email"><i data-lucide="mail" class="w-5 h-5"></i></a>` : ''}
          ${P.orcidUrl ? `<a href="${P.orcidUrl}" target="_blank" rel="noreferrer" class="hover:text-[#A6CE39] transition-colors" title="ORCID">${orcidSVG}</a>` : ''}
          ${P.githubUrl ? `<a href="${P.githubUrl}" target="_blank" rel="noreferrer" class="hover:text-white transition-colors" title="GitHub"><i data-lucide="github" class="w-5 h-5"></i></a>` : ''}
          ${P.scholarUrl ? `<a href="${P.scholarUrl}" target="_blank" rel="noreferrer" class="hover:text-white transition-colors" title="Google Scholar"><i data-lucide="graduation-cap" class="w-5 h-5"></i></a>` : ''}
        </div>
      </div>
      <div class="md:text-right text-sm">
        <p>&copy; ${new Date().getFullYear()} ${P.name}. All rights reserved.</p>
        <p class="mt-2 text-slate-500">Built with Tailwind CSS</p>
      </div>
    </div>`;

  /* ── mount ── */
  document.getElementById('app').innerHTML = hero + news + pubs + grants + contact;
  lucide.createIcons();

  /* ── visitor map: safely inject embed code (handles <script> tags) ── */
  if(VM.enabled && VM.embedHtml){
    const container = document.getElementById('visitor-map-widget');
    if(container){
      const tmp = document.createElement('div');
      tmp.innerHTML = VM.embedHtml;
      const scripts = tmp.querySelectorAll('script');
      if(scripts.length > 0){
        scripts.forEach(old=>{
          const s = document.createElement('script');
          if(old.src) s.src = old.src;
          else s.textContent = old.textContent;
          Array.from(old.attributes).forEach(a=>{ if(a.name!=='src') s.setAttribute(a.name,a.value); });
          container.appendChild(s);
        });
        tmp.querySelectorAll(':not(script)').forEach(el=> container.appendChild(el));
      } else {
        container.innerHTML = VM.embedHtml;
      }
    }
  }

  /* ── scroll: nav background + active pill ── */
  const nav   = document.getElementById('navbar');
  const pills = ()=> document.querySelectorAll('.nav-pill');
  const sIDs  = navItems.map(n=>n.id);

  window.addEventListener('scroll', ()=>{
    const y = window.scrollY;
    if(y > 50){
      nav.classList.add('bg-white/80','backdrop-blur-md','shadow-sm','py-3');
      nav.classList.remove('bg-transparent','py-5');
    } else {
      nav.classList.remove('bg-white/80','backdrop-blur-md','shadow-sm','py-3');
      nav.classList.add('bg-transparent','py-5');
    }
    let active = sIDs[0];
    for(const id of sIDs){
      const el = document.getElementById(id);
      if(el && y + 120 >= el.offsetTop) active = id;
    }
    pills().forEach(p=>{
      if(p.dataset.nav === active){
        p.classList.add('bg-blue-600','text-white','shadow-md');
        p.classList.remove('text-slate-600');
      } else {
        p.classList.remove('bg-blue-600','text-white','shadow-md');
        p.classList.add('text-slate-600');
      }
    });
  });
  window.dispatchEvent(new Event('scroll'));

  /* ── scroll reveal (IntersectionObserver) ── */
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('visible'); obs.unobserve(e.target); }});
  },{ threshold:.12 });
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));

})();
</script>
</body>
</html>
