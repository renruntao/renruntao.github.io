name: Deploy GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Replace cache-busting token
        shell: bash
        run: |
          python - <<'PY'
          import os
          path = "index.html"
          sha  = os.environ["GITHUB_SHA"][:12]
          with open(path, "r", encoding="utf-8") as f:
            s = f.read()
          s = s.replace("__BUILD_SHA__", sha)
          with open(path, "w", encoding="utf-8") as f:
            f.write(s)
          print("Injected SHA:", sha)
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

